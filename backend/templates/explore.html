{% extends "base.html" %}
{% block content %}

<div class="container mt-5">

    <div class="row">

        <!-- SIDEBAR -->
        <div class="col-md-3">
            <div class="filter-box p-3">

                <form method="GET">

                    <h5 class="mb-3">Search</h5>
                    <input type="text" name="search" class="form-control mb-3"
                           placeholder="Search tenders...">

                    <h5>Categories</h5>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="category" value="Construction">
                        <label class="form-check-label">Construction</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="category" value="Education">
                        <label class="form-check-label">Education</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="category" value="Electrical">
                        <label class="form-check-label">Electrical</label>
                    </div>

                    <h5 class="mt-4">Location</h5>
                    <select name="location" class="form-control mb-3">
                        <option value="">All</option>
                        <option>Nagpur</option>
                        <option>Mumbai</option>
                        <option>Pune</option>
                    </select>

                    <h5>Risk Level</h5>
                    <select name="risk" class="form-control mb-3">
                        <option value="">All</option>
                        <option>Low</option>
                        <option>Medium</option>
                        <option>High</option>
                    </select>

                    <h5>Sort By</h5>
                    <select name="sort" class="form-control mb-3">
                        <option value="fit">Best Fit</option>
                        <option value="latest">Latest</option>
                        <option value="deadline">Deadline</option>
                    </select>

                    <button type="submit" class="btn btn-primary w-100">
                        Apply Filters
                    </button>

                </form>

            </div>
        </div>

        <!-- TENDER RESULTS -->
        <div class="col-md-9">

            {% for tender in tenders %}
            <div class="card mb-4 p-3">

                <h5>{{ tender[1] }}</h5>

                <p>
                    <strong>Department:</strong> {{ tender[2] }} |
                    <strong>Location:</strong> {{ tender[3] }} |
                    <strong>Deadline:</strong> {{ tender[4] }}
                </p>

                <div>
                    <span class="badge bg-success">
                        Fit: {{ tender[9] }}
                    </span>

                    <span class="badge bg-danger">
                        Risk: {{ tender[7] }}
                    </span>
                </div>

            </div>
            {% endfor %}

        </div>

    </div>

</div>

{% endblock %}
